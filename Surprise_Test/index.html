<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart To-Do Manager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      .completed-task {
        text-decoration: line-through;
        color: #6c757d;
      }
      .overdue-task {
        border-left: 4px solid #dc3545 !important;
      }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-info mb-4">
      <div class="container">
        <span class="navbar-brand fw-bold fs-4"
          ><i class="fa-solid fa-list-check"></i> Smart To-Do Manager</span
        >
      </div>
    </nav>

    <div class="container">
      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <h5 class="card-title mb-3">Add New Task</h5>

          <div class="mb-3">
            <label class="form-label">Task Name</label>
            <input
              type="text"
              id="taskInput"
              class="form-control"
              placeholder="Enter task name..."
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Priority</label>
            <select id="prioritySelect" class="form-select">
              <option value="High">High</option>
              <option value="Medium" selected>Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Deadline</label>
            <input type="date" id="deadlineInput" class="form-control" />
          </div>

          <div id="formError" class="text-danger mb-2 small d-none">
            Task name cannot be empty.
          </div>

          <button class="btn btn-info w-100" onclick="addTask()">
            + Add Task
          </button>
        </div>
      </div>
      <div class="row g-3 mb-4 text-center">
        <div class="col-4">
          <div class="card shadow-sm">
            <div class="card-body py-2">
              <h4 class="mb-0 text-info" id="countTotal">0</h4>
              <small class="text-muted">Total</small>
            </div>
          </div>
        </div>
        <div class="col-4">
          <div class="card shadow-sm">
            <div class="card-body py-2">
              <h4 class="mb-0 text-success" id="countDone">0</h4>
              <small class="text-muted">Completed</small>
            </div>
          </div>
        </div>
        <div class="col-4">
          <div class="card shadow-sm">
            <div class="card-body py-2">
              <h4 class="mb-0 text-warning" id="countPending">0</h4>
              <small class="text-muted">Pending</small>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
        <div class="btn-group" role="group">
          <button
            class="btn btn-outline-info active"
            id="filter-all"
            onclick="setFilter('all')"
          >
            All
          </button>
          <button
            class="btn btn-outline-info"
            id="filter-pending"
            onclick="setFilter('pending')"
          >
            Pending
          </button>
          <button
            class="btn btn-outline-info"
            id="filter-completed"
            onclick="setFilter('completed')"
          >
            Completed
          </button>
        </div>
        <div class="btn-group ms-auto" role="group">
          <button
            class="btn btn-outline-secondary"
            id="sort-priority"
            onclick="setSort('priority')"
          >
            <i class="fa-solid fa-sort"></i>
            Priority
          </button>
          <button
            class="btn btn-outline-secondary"
            id="sort-deadline"
            onclick="setSort('deadline')"
          >
            <i class="fa-solid fa-sort"></i>
            Deadline
          </button>
        </div>
      </div>

      <div id="taskList"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
